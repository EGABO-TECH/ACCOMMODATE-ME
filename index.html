<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listing Form</title>
    <link rel="stylesheet"href="styleS.css">
</head>
<body>
  <div class="form-container">
    <h2>List Your Property</h2>
    <p>Register as a Landlord and reach thousands of students</p>

    <form>
        <div class="form-group">
            <label>Full Name</label>
        <input type="text" placeholder="Kisembo Jonathan">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+256700000000">
        </div>
        <div class="Form-group">
            <label>Email</label>
            <input type="email" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label>Location</label>
            <select>
                <option >Select Location</option>
                <option>Nakawa</option>
                <option>Kiwatule</option>
                <option>Kabalangala</option>
                <option>Kasanga</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rental Type</label>
            <div class="Radio-Group">
                <label><input type="radio"name="type">Hostel</label>
                <label><input type="radio"name="type">Airbnb</label>
                <label><input type="radio"name="type">Apartment</label>

            </div>
        </div>
        <div class="form-group">
            <label>Monthly Rate (UGX)</label>
            <input type="number"placeholder="350,000">

        </div>
        <div class="form-group">
        <label>Availability</label>
        <select>
            <option>Available</option>
            <option>Fully Booked</option>
            <option>Awaiting</option>
        </select>
        </div>
        <div class="form-group">
            <label>Property Description</label>
            <textarea placeholder="Describe your property... "></textarea>
        </div>
        <button type="submit" class="submit-btn">Submit Listings </button>
    </form>
    </div>
</body>
</html>
