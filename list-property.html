<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIST PROPERTY</title>
    <link rel="icon" type="image/png" href="Assets/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <!--LIST PROPERTY-->
    <section class="listing-section">
      <div class="form-container">
        <div class="form-header">
          <div class="header-icon">
            <i class="fas fa-user-plus"></i>
          </div>
          <h2>List Your Property</h2>
          <p>Register as a landlord and reach thousands of students</p>
        </div>

        <form class="property-form">
          <div class="input-grid">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" placeholder="e.g. Natozo Patience Martha" required />
            </div>

            <div class="form-group">
              <label>Phone Number *</label>
              <input
                type="tel"
                placeholder="+256 700 000 000"
                pattern="^\+256\d{9}$"
                title="Please enter a valid Ugandan number starting with +256"
                required
              />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="email@example.com" />
            </div>

            <div class="form-group">
              <label>Location *</label>
              <select required>
                <option value="" disabled selected>Select location</option>
                <option value="Nsambya">Nsambya</option>
                <option value="Kabalagala">Kabalagala</option>
                <option value="Kansanga">Kansanga</option>
              </select>
            </div>

            <div class="form-group">
              <label>Rental Type *</label>
              <select required>
                <option value="" disabled selected>Select type</option>
                <option value="Hostel">Hostel</option>
                <option value="Apartment">Apartment</option>
                <option value="Rental">Rental</option>
                <option value="Air BnB">Air BnB</option>
              </select>
            </div>

            <div class="form-group">
              <label>Monthly Rent (UGX) *</label>
              <input type="number" id="rent" min="150000" placeholder="350000" required>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Availability</label>
            <select>
              <option value="available">Available</option>
              <option value="booked">Fully Booked</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Property Description</label>
            <textarea
              rows="4"
              placeholder="Describe your property..."
            ></textarea>
          </div>

          <button type="submit" class="submit-btn">Submit Listing</button>
        </form>
        </div>
      </div>
    </section>
  </body>
</html>
